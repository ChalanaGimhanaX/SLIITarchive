version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: sliit_archive_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: sliit_archive
      POSTGRES_USER: sliit_user
      POSTGRES_PASSWORD: sliit_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sliit_user -d sliit_archive"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sliit_archive_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
